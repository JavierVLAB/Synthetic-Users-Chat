# Docker Compose para el sistema de usuarios sintéticos Moeve.
#
# Servicios:
#   - backend:  API FastAPI con Uvicorn
#   - frontend: Aplicación Next.js (standalone)
#
# Uso:
#   docker-compose up --build        # Primera vez o tras cambios en código/deps
#   docker-compose up                # Arranque normal
#   docker-compose down              # Parar y eliminar contenedores
#
# NEXT_PUBLIC_API_URL se incrusta en el bundle del navegador en tiempo de build.
# El navegador llama al backend desde fuera de Docker, por eso usa localhost:8000.
# Para producción, sobreescribe el ARG con el dominio real:
#   docker-compose build --build-arg NEXT_PUBLIC_API_URL=https://api.tudominio.com

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: synthetic-user-chat-backend
    ports:
      - "127.0.0.1:8010:8000"
    env_file:
      - .env
    volumes:
      - backend-data:/app/data/db
      - ./backend/data/profiles:/app/data/profiles
      - ./backend/data/briefs:/app/data/briefs
      - ./backend/prompts:/app/prompts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      # El healthcheck usa el puerto interno del contenedor (8000), no el expuesto (8010)
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    networks:
      - moeve-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8010
    container_name: synthetic-user-chat-frontend
    ports:
      - "3010:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - moeve-network

volumes:
  backend-data:

networks:
  moeve-network:
    driver: bridge
