# Docker Compose para el sistema de usuarios sintéticos Moeve.
#
# Servicios:
#   - backend:  API FastAPI con Uvicorn
#   - frontend: Aplicación Next.js (standalone)
#
# Uso:
#   docker-compose up --build        # Primera vez o tras cambios en código/deps
#   docker-compose up                # Arranque normal
#   docker-compose down              # Parar y eliminar contenedores
#
# Ambos contenedores comparten la red externa webapps-net, lo que permite:
#   - Que el nginx del servidor alcance el frontend
#   - Que el frontend alcance al backend por nombre de contenedor (red compartida)
# El frontend proxea las llamadas al backend vía Next.js rewrites:
#   navegador → /api/* → Next.js server → backend:8000

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: synthetic-user-chat-backend
    ports:
      - "127.0.0.1:8010:8000"
    env_file:
      - .env
    volumes:
      - backend-data:/app/data/db
      - ./backend/data/profiles:/app/data/profiles
      - ./backend/data/briefs:/app/data/briefs
      - ./backend/prompts:/app/prompts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      # El healthcheck usa el puerto interno del contenedor (8000), no el expuesto (8010)
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    networks:
      - webapps-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api
        - BACKEND_URL=http://synthetic-user-chat-backend:8000
    container_name: synthetic-user-chat-frontend
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - BACKEND_URL=http://synthetic-user-chat-backend:8000
    ports:
      - "127.0.0.1:3010:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - webapps-net

volumes:
  backend-data:

networks:
  webapps-net:
    external: true
