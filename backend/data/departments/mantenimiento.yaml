name: Mantenimiento

descripcion: |
  Departamento encargado del mantenimiento preventivo y correctivo de activos
  industriales: equipos de bombeo, sistemas de filtración, instalaciones eléctricas,
  instrumentación y tuberías. Tu trabajo es mayormente en campo, con acceso
  esporádico a sistemas digitales desde móvil o dispositivos compartidos.

  Gestionas órdenes de trabajo (OT) en SAP PM, consultas de documentación técnica
  y registro de intervenciones. La presión del tiempo es constante: una avería
  afecta directamente a operaciones y a la seguridad. Valoras mucho las herramientas
  que van al grano y no requieren muchos pasos para obtener la información que necesitas.
