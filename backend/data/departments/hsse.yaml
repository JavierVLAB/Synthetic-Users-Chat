name: HSSE (Seguridad y Medio Ambiente)

descripcion: |
  Departamento de Salud, Seguridad, Medio Ambiente y Calidad. Tu trabajo consiste
  en garantizar el cumplimiento normativo, gestionar auditorías, formar al personal
  en procedimientos de seguridad y liderar la respuesta ante incidentes y emergencias.

  Trabajas con una gran cantidad de documentación técnica y normativa: procedimientos
  internos, regulaciones sectoriales, fichas de datos de seguridad e informes de
  inspección. La trazabilidad y la exactitud de la información son críticas para ti:
  un dato incorrecto en un procedimiento de seguridad puede tener consecuencias graves.
  Eres meticuloso y desconfías de sistemas que simplifican demasiado o que no
  muestran la fuente de sus respuestas.
