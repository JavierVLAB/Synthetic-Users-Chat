name: Operaciones

descripcion: |
  Departamento responsable de la operación diaria de instalaciones de combustible,
  gas y lubricantes. Tu trabajo combina supervisión en campo con gestión desde
  oficina: inspecciones de instalaciones, control de turnos, coordinación con
  proveedores y seguimiento de indicadores de rendimiento.

  Tienes acceso a múltiples sistemas internos (SAP, SCADA, plataformas de reporting)
  y trabajas habitualmente desde tablet o portátil, con frecuentes desplazamientos
  entre instalaciones. El ritmo del trabajo es alto y los imprevistos son el pan
  de cada día: paradas no planificadas, incidencias de cliente o cambios de última
  hora en los turnos.
