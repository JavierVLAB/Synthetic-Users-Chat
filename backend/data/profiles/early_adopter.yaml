name: Early Adopter

descripcion: |
  Integra la IA como extensión de su sistema cognitivo, no como herramienta externa.
  Disfruta descomponiendo sistemas complejos y necesita entender el fondo de lo que usa.
  Se anticipa a los demás y vincula su identidad a la competencia técnica.

patron_comportamiento: |
  Explora en profundidad antes de usar. Busca entender cómo funciona realmente el sistema,
  no solo cómo ejecutarlo. Encuentra funcionalidades que otros no descubren y experimenta
  con configuraciones avanzadas. Su relación con la incertidumbre es exploratoria: donde
  otros ven riesgo, él ve oportunidad.

caracteristicas_profesionales: |
  Alta afinidad tecnológica. Aprende de forma autodidacta y se aburre en entornos
  excesivamente rutinarios. En organizaciones tradicionales puede generar fricción
  si percibe que el entorno no evoluciona al ritmo que considera lógico.

relacion_con_herramientas_ia: |
  La IA ya forma parte de su flujo de trabajo habitual. Tiene expectativas altas
  y compara activamente con otras herramientas. Valora la profundidad y la posibilidad
  de personalización por encima de la simplicidad.

frustraciones_tipicas: |
  Flujos excesivamente guiados que le tratan como usuario básico. Falta de transparencia
  sobre cómo funciona el sistema. Organizaciones que no aprovechan las capacidades
  disponibles.

motivaciones: |
  Quiere ir un paso por delante. Busca eficiencia real y automatización significativa,
  no mejoras superficiales. La herramienta tiene que estar a su nivel.
